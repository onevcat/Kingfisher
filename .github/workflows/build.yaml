name: build

defaults:
  run:
    shell: bash -eo pipefail {0}

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-framework:
    name: build (Xcode ${{ matrix.xcode }}, ${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - xcode: '26.2'
            runner: macos-26
            destination: 'platform=macOS'
            label: 'macOS'
            cache-key: xcode-26.2-macos
          - xcode: '26.2'
            runner: macos-26
            sdk: iphonesimulator
            label: 'iOS Simulator'
            cache-key: xcode-26.2-ios
          - xcode: '26.2'
            runner: macos-26
            sdk: appletvsimulator
            label: 'tvOS Simulator'
            cache-key: xcode-26.2-tvos
          - xcode: '26.2'
            runner: macos-26
            sdk: watchsimulator
            label: 'watchOS Simulator'
            cache-key: xcode-26.2-watchos

          - xcode: '26.3'
            runner: macos-26
            destination: 'platform=macOS'
            label: 'macOS'
            cache-key: xcode-26.3-macos
          - xcode: '26.3'
            runner: macos-26
            sdk: iphonesimulator
            label: 'iOS Simulator'
            cache-key: xcode-26.3-ios
          - xcode: '26.3'
            runner: macos-26
            sdk: appletvsimulator
            label: 'tvOS Simulator'
            cache-key: xcode-26.3-tvos
          - xcode: '26.3'
            runner: macos-26
            sdk: watchsimulator
            label: 'watchOS Simulator'
            cache-key: xcode-26.3-watchos

          - xcode: '26.4.1'
            runner: macos-26
            destination: 'platform=macOS'
            label: 'macOS'
            cache-key: xcode-26.4.1-macos
          - xcode: '26.4.1'
            runner: macos-26
            sdk: iphonesimulator
            label: 'iOS Simulator'
            cache-key: xcode-26.4.1-ios
          - xcode: '26.4.1'
            runner: macos-26
            sdk: appletvsimulator
            label: 'tvOS Simulator'
            cache-key: xcode-26.4.1-tvos
          - xcode: '26.4.1'
            runner: macos-26
            sdk: watchsimulator
            label: 'watchOS Simulator'
            cache-key: xcode-26.4.1-watchos
    steps:
      - uses: actions/checkout@v6
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
      - name: Build framework
        env:
          DESTINATION: ${{ matrix.destination }}
          SDK: ${{ matrix.sdk }}
          DERIVED_DATA_PATH: build/DerivedData/${{ matrix.cache-key }}
          XCODE_VERSION: ${{ matrix.xcode }}
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: '60'
          FASTLANE_XCODEBUILD_SETTINGS_RETRIES: '4'
        run: bundle exec fastlane build_ci
